<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Eco-Efficient Route</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var map = L.map('map').setView([11, 78], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // This function will be called by Java
    function drawRoute(geojson) {
      if (window.routeLayer) {
        map.removeLayer(window.routeLayer);
      }
      window.routeLayer = L.geoJSON(geojson, {
        style: { color: 'green', weight: 5, opacity: 0.8 }
      }).addTo(map);
      map.fitBounds(window.routeLayer.getBounds());
    }
  </script>
</body>
</html>
